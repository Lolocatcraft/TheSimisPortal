<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/TheSimisLogo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>The Simis Portal</title>
</head>
<style>
    body {
       background-color: #e1fee1;
    }
</style>
<body>
    <div class="Cabesalho">
        <div class="LadoALado">
            <img onclick="window.location.href='index.html'" class="imglogo" src="img/TheSimisLogo.jpg">
            <h1 class="">The Simis Portal.com</h1>
        </div>
    </div>
    <h1 class="">Cheats que podem te ajudar hoje</h1>
    <div class="LadoALado">
        <img onclick="window.location.href='CheatIIDinheiroInfinitos.html'" class="imgCatalogo" src="img/CheatInfinitos Dienheiros.png">   
        <img onclick="window.location.href='CheatDeCarros.html'" class="imgCatalogo" src="img/Cheat Carros.png">
        <button>Mais cheats</button>
    </div>
    <h1 class="">Você Gostou</h1>
    <div class="LadoALado">
        <img id="GostouImg1" onclick="" class="imgCatalogo" src="">
    </div>
    <h1>Casas Para os seus simis</h1>
    <div class="LadoALado">
        <img class="imgCatalogo" onclick="window.location.href='CasaRaisesTheSimis.html'" src="img/Casa 1.PNG" alt="Casa: Raises The Simis">
    </div>
    <h1 class="">Comodos</h1>
    <div class="LadoALado">
        <img class="imgCatalogo" onclick="window.location.href='ComodoUmquartoDeFamilia.html'" src="img/Comodo 1.PNG" alt="Comodo: Um quarto de Familia">
    </div>
    <script>
       document.addEventListener("DOMContentLoaded", function() {
            const img = document.getElementById("GostouImg1");

            // Pega o valor salvo em localStorage
            const gostou = localStorage.getItem("Gostou");

             // Verifica qual valor está salvo e troca o src
            if (gostou === "DinheiroInfinito") {
            img.setAttribute("src", "img/CheatInfinitos Dienheiros.png");
            img.setAttribute("onclick", "window.location.href='CheatIIDinheiroInfinitos.html'");
            }
            if (gostou === "Cars") {
            img.setAttribute("src", "img/Cheat Carros.png");
            img.setAttribute("onclick", "window.location.href='CheatDeCarros.html'");
            }
         });
    </script>
</body>
</html>
